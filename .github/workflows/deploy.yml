name: deploy

# Production-only workflow. Fires on push to main (post-merge) and re-runs the full test suite
# before pushing the new image to GHCR and telling the Hetzner VPS to pull + restart. Does NOT
# run on PRs, does NOT run on dev — ci.yml covers those. workflow_dispatch gives operators a
# manual re-deploy escape hatch for rollbacks (push the :sha-<old> tag via the re-run-with-inputs
# UI once and the SSH step pulls whatever is tagged :latest on GHCR — see docs/operations/
# ci-cd-pipeline.md for the runbook).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify-secrets:
    name: verify required secrets
    runs-on: ubuntu-24.04
    steps:
      # Fail fast if any production secret is missing. GitHub Actions does not expose secret names
      # in the runtime environment, so we probe their truthiness via the condition block below.
      - name: check HETZNER_HOST
        if: ${{ secrets.HETZNER_HOST == '' }}
        run: |
          echo "::error::HETZNER_HOST secret is missing. Configure under repo settings → secrets → actions."
          exit 1
      - name: check HETZNER_USER
        if: ${{ secrets.HETZNER_USER == '' }}
        run: |
          echo "::error::HETZNER_USER secret is missing. Configure under repo settings → secrets → actions."
          exit 1
      - name: check HETZNER_SSH_KEY
        if: ${{ secrets.HETZNER_SSH_KEY == '' }}
        run: |
          echo "::error::HETZNER_SSH_KEY secret is missing. Configure under repo settings → secrets → actions."
          exit 1

  test:
    name: re-run tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: verify-secrets

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: contract_engine
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: contract_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contract_engine"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: Host=localhost;Port=5432;Database=contract_engine_test;Username=contract_engine;Password=localdev
      ASPNETCORE_ENVIRONMENT: Testing
      AUTO_MIGRATE: "false"
      AUTO_SEED: "false"
      JOBS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - run: dotnet restore ContractEngine.sln
      - run: dotnet build ContractEngine.sln --no-restore -c Release
      - run: |
          dotnet test tests/ContractEngine.Core.Tests/ContractEngine.Core.Tests.csproj --no-build -c Release
          dotnet test tests/ContractEngine.Api.Tests/ContractEngine.Api.Tests.csproj --no-build -c Release
          dotnet test tests/ContractEngine.Integration.Tests/ContractEngine.Integration.Tests.csproj --no-build -c Release

  build-and-push:
    name: build and push image
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: test

    # Required for pushing to GHCR using the workflow-bound GITHUB_TOKEN.
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: compute short sha
        id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/kingsleyonoh/contract-lifecycle-engine:latest
            ghcr.io/kingsleyonoh/contract-lifecycle-engine:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-vps:
    name: deploy to Hetzner
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      # Copy the deploy scripts + prod compose file up to the VPS. The compose file is committed
      # (no secrets — uses ${VAR} references); the .env on the VPS is managed out-of-band.
      - name: copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml,scripts/deploy/smoke-and-rollback.sh,scripts/deploy/remember-previous-tag.sh"
          target: /opt/contract-engine/
          strip_components: 0

      # Pull latest image, remember previous tag for rollback, restart the compose stack, then
      # poll /health/ready until it comes back up. The smoke-and-rollback.sh script returns
      # non-zero on failure and pulls the previous tag as a recovery step.
      - name: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/contract-engine
            chmod +x scripts/deploy/*.sh
            bash scripts/deploy/remember-previous-tag.sh
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d
            bash scripts/deploy/smoke-and-rollback.sh "https://contracts.kingsleyonoh.com/health/ready"
